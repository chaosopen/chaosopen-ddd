spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ddd_test;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
  rabbitmq:
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false
